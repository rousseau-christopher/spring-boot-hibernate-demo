spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/hibernate
    username: postgres
    password: postgres
    #hikari:
      #connection-init-sql: CREATE EXTENSION IF NOT EXISTS pg_trgm;

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
    database-platform: com.zenika.hibernate.infrastructure.repository.configuration.CustomPostgreSqlDialect

management:
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} %highlight(%-5level) %green(%thread) %cyan(%logger{15}) - %msg %yellow(%mdc) %n"
  level:
  # log transaction
    org.springframework.orm.jpa.JpaTransactionManager: INFO

   # log JPA
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.hibernate.orm.jdbc.bind: TRACE

    # log jdbc
    org.springframework.jdbc.core.JdbcTemplate: DEBUG
    org.springframework.jdbc.core.StatementCreatorUtils: TRACE

    # request filter
    org.springframework.web.filter.CommonsRequestLoggingFilter: INFO



springdoc:
  show-actuator: false
